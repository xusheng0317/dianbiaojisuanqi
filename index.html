<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="电表计算">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>电表计算器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#F5F5F0;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#1a1a1a;}
.隐藏{display:none!important;}
.btn{font-family:inherit;cursor:pointer;border:none;outline:none;}

#提示条{position:fixed;top:0;left:0;right:0;z-index:999;padding:14px 20px;font-size:17px;font-weight:500;text-align:center;transform:translateY(-100%);transition:transform .3s;}
#提示条.显示{transform:translateY(0);}
.提示成功{background:#1D9E75;color:#fff;}
.提示错误{background:#CC3333;color:#fff;}
.提示普通{background:#333;color:#fff;}

/* ══ 首页 ══ */
#首页{min-height:100vh;display:flex;flex-direction:column;padding-bottom:48px;}
.首页顶栏{padding:28px 22px 8px;display:flex;align-items:flex-end;justify-content:space-between;}
.首页大标题{font-size:30px;font-weight:700;line-height:1.2;}
.首页大标题 span{display:block;font-size:17px;font-weight:400;color:#888;margin-top:5px;}
.首页内容{flex:1;padding:16px 18px 0;}

.空状态{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;text-align:center;}
.空状态图标{font-size:52px;margin-bottom:16px;}
.空状态文字{font-size:18px;color:#888;line-height:1.7;}

.分组列表{display:flex;flex-direction:column;gap:14px;margin-bottom:22px;}
.分组卡片{background:#fff;border-radius:18px;border:2px solid #EAEAE6;padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;}
.分组卡片:active{border-color:#1D9E75;background:#F9FFFE;}
.分组图标{width:52px;height:52px;border-radius:14px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.分组信息{flex:1;min-width:0;}
.分组名称{font-size:20px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.分组码行{display:flex;align-items:center;gap:10px;}
.码显示{font-size:16px;color:#888;font-weight:500;letter-spacing:2px;}
.最后使用{font-size:14px;color:#bbb;}
.卡片右侧{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.进入箭头{font-size:24px;color:#ccc;line-height:1;}
.删除分组btn{font-size:14px;font-weight:500;padding:6px 12px;border:1.5px solid #FECACA;border-radius:10px;background:#FEF2F2;color:#B91C1C;cursor:pointer;font-family:inherit;white-space:nowrap;}

.底部操作{padding:0 18px;display:flex;flex-direction:column;gap:12px;}
.主操作btn{width:100%;font-size:20px;font-weight:600;padding:18px;border-radius:16px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-family:inherit;}
.主操作btn:active{opacity:.85;}
.次操作btn{width:100%;font-size:18px;font-weight:500;padding:16px;border-radius:16px;background:#fff;color:#1a1a1a;border:2px solid #E0E0DA;cursor:pointer;font-family:inherit;}
.次操作btn:active{background:#F5F5F0;}

/* ══ 弹层 ══ */
#弹层遮罩{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;}
.弹层内容{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 52px;}
.弹层标题{font-size:22px;font-weight:700;margin-bottom:6px;}
.弹层说明{font-size:15px;color:#888;margin-bottom:24px;line-height:1.6;}
.输入标签{font-size:17px;font-weight:500;color:#333;margin-bottom:10px;display:block;}
.码输入框{width:100%;font-size:36px;font-weight:700;letter-spacing:8px;text-align:center;color:#1a1a1a;border:2px solid #E0E0DA;border-radius:14px;padding:16px 12px;outline:none;background:#FAFAF8;font-family:inherit;margin-bottom:8px;}
.码输入框:focus{border-color:#1D9E75;}
.码提示{font-size:14px;color:#aaa;text-align:center;margin-bottom:22px;}
.弹层主btn{width:100%;font-size:20px;font-weight:600;padding:18px;border-radius:14px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-family:inherit;margin-bottom:12px;}
.弹层主btn:active{opacity:.85;}
.弹层主btn:disabled{background:#ccc;cursor:not-allowed;}
.弹层次btn{width:100%;font-size:18px;font-weight:500;padding:15px;border-radius:14px;background:transparent;color:#888;border:2px solid #E8E8E4;cursor:pointer;font-family:inherit;}
.弹层次btn:active{background:#F5F5F0;}
.新码展示{background:#F0FAF6;border:2px solid #A7F3D0;border-radius:16px;padding:20px;text-align:center;margin-bottom:20px;}
.新码标签{font-size:15px;color:#065F46;margin-bottom:8px;}
.新码数字{font-size:48px;font-weight:700;color:#065F46;letter-spacing:10px;}
.新码说明{font-size:14px;color:#0F6E56;margin-top:8px;line-height:1.6;}

/* ══ 主应用 ══ */
#主应用{min-height:100vh;padding-bottom:48px;}
.顶栏{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;background:#fff;border-bottom:1px solid #EAEAE6;position:sticky;top:0;z-index:50;}
.顶栏左{display:flex;flex-direction:column;gap:4px;}
.顶栏标题行{display:flex;align-items:center;gap:10px;}
.返回btn{font-size:16px;font-weight:500;padding:7px 14px;border-radius:11px;border:2px solid #E0E0DA;background:#fff;color:#555;cursor:pointer;font-family:inherit;white-space:nowrap;}
.返回btn:active{background:#F5F5F0;}
.应用标题{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.状态行{display:flex;align-items:center;gap:8px;}
.码标记{font-size:14px;color:#555;font-weight:500;}
.同步徽章{font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px;}
.徽章同步中{background:#FFF8E1;color:#B45309;}
.徽章已同步{background:#DCFCE7;color:#166534;}
.徽章离线{background:#F3F4F6;color:#6B7280;}
.编辑按钮{font-size:18px;font-weight:600;padding:11px 22px;border-radius:13px;border:2px solid #D0D0CC;background:#fff;color:#1a1a1a;font-family:inherit;cursor:pointer;}
.编辑按钮.激活{background:#1D9E75;border-color:#1D9E75;color:#fff;}
.编辑按钮:active{opacity:.85;}

.内容区{padding:20px;display:flex;flex-direction:column;gap:20px;}
.卡片{background:#fff;border-radius:18px;overflow:hidden;border:2px solid #EAEAE6;}
.卡片.编辑态{border-color:#1D9E75;}
.卡片头{display:flex;align-items:center;gap:12px;padding:16px 18px;background:#FAFAF8;border-bottom:1px solid #EAEAE6;}
.卡片标题{flex:1;font-size:21px;font-weight:600;}
.卡片标题输入{flex:1;font-size:20px;font-weight:600;background:#fff;border:2px solid #D0D0CC;border-radius:10px;padding:7px 11px;outline:none;font-family:inherit;color:#1a1a1a;}
.删除卡片btn{font-size:16px;font-weight:500;padding:9px 16px;border-radius:11px;border:2px solid #FECACA;background:#FEF2F2;color:#B91C1C;font-family:inherit;cursor:pointer;white-space:nowrap;}
.卡片体{padding:18px;}
.公式行{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #EAEAE6;}
.小标签{font-size:16px;color:#888;white-space:nowrap;}
.公式展示{flex:1;font-size:16px;color:#555;font-family:'Courier New',monospace;background:#F5F5F0;padding:9px 14px;border-radius:11px;word-break:break-all;}
.公式输入{flex:1;font-size:16px;font-family:'Courier New',monospace;color:#1a1a1a;background:#fff;border:2px solid #D0D0CC;border-radius:11px;padding:9px 12px;outline:none;}
.公式输入:focus{border-color:#1D9E75;}
.公式提示{font-size:13px;color:#aaa;margin-top:6px;}
.变量列表{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}
.变量行{display:flex;align-items:center;gap:12px;}
.变量名称{font-size:18px;color:#555;min-width:110px;max-width:140px;line-height:1.35;}
.变量名输入{font-size:16px;width:130px;background:#fff;border:2px solid #D0D0CC;border-radius:10px;padding:8px 10px;outline:none;font-family:inherit;color:#1a1a1a;}
.数值输入{flex:1;font-size:30px;font-weight:600;padding:13px 16px;border:2px solid #E0E0DA;border-radius:13px;text-align:right;background:#fff;color:#1a1a1a;outline:none;font-family:inherit;}
.数值输入:focus{border-color:#1D9E75;}
.数值输入::placeholder{color:#ccc;font-size:24px;font-weight:400;}
.删除变量btn{font-size:15px;font-weight:500;padding:9px 14px;border-radius:10px;border:2px solid #FECACA;background:#FEF2F2;color:#B91C1C;font-family:inherit;cursor:pointer;white-space:nowrap;}
.新增变量btn{width:100%;font-size:18px;padding:14px;border:2px dashed #D0D0CC;border-radius:13px;background:transparent;color:#888;font-family:inherit;cursor:pointer;margin-bottom:18px;}
.新增变量btn:active{background:#F5F5F0;}
.结果区{display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:15px;background:#F0FAF6;border:2px solid #A7F3D0;}
.结果标签{font-size:18px;color:#065F46;font-weight:600;white-space:nowrap;}
.结果数值{flex:1;font-size:42px;font-weight:700;color:#065F46;text-align:right;letter-spacing:-.02em;}
.结果空{flex:1;font-size:34px;font-weight:600;color:#A7F3D0;text-align:right;}
.结果单位{font-size:20px;color:#065F46;font-weight:500;min-width:24px;}
.结果单位输入{font-size:18px;width:70px;text-align:center;background:transparent;border:none;border-bottom:2px solid #A7F3D0;color:#065F46;outline:none;font-family:inherit;}
.错误区{padding:16px 18px;border-radius:15px;background:#FEF2F2;border:2px solid #FECACA;font-size:17px;color:#B91C1C;text-align:center;}
.新增项目btn{width:100%;font-size:20px;font-weight:500;padding:20px;border-radius:18px;border:2px dashed #D0D0CC;background:#fff;color:#888;cursor:pointer;font-family:inherit;}
.新增项目btn:active{background:#F5F5F0;}

/* 设置面板 */
#设置面板{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;}
.设置内容{width:100%;background:#fff;border-radius:22px 22px 0 0;padding:28px 24px 48px;max-height:85vh;overflow-y:auto;}
.设置标题{font-size:22px;font-weight:700;margin-bottom:6px;}
.设置说明{font-size:15px;color:#888;margin-bottom:24px;line-height:1.6;}
.设置标签{font-size:17px;font-weight:500;margin-bottom:8px;display:block;}
.设置输入{width:100%;font-size:18px;border:2px solid #E0E0DA;border-radius:12px;padding:14px 16px;outline:none;font-family:inherit;background:#FAFAF8;color:#1a1a1a;margin-bottom:18px;}
.设置输入:focus{border-color:#1D9E75;}
.步骤块{background:#F5F5F0;border-radius:14px;padding:16px 18px;margin-bottom:18px;}
.步骤标题{font-size:16px;font-weight:600;margin-bottom:8px;}
.步骤内容{font-size:15px;color:#555;line-height:1.7;}
.步骤内容 a{color:#1D9E75;text-decoration:none;}
.设置保存btn{width:100%;font-size:19px;font-weight:500;padding:16px;border-radius:13px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="提示条"></div>

<!-- ══ 首页 ══ -->
<div id="首页">
  <div class="首页顶栏">
    <div class="首页大标题">⚡ 电表计算器<span>选择分组进入</span></div>
  </div>
  <div class="首页内容">
    <div id="分组列表区"></div>
  </div>
  <div class="底部操作">
    <button class="btn 主操作btn" onclick="打开加入弹层()">输入共享码，加入分组</button>
    <button class="btn 次操作btn" onclick="点新建()">新建分组，获取共享码</button>
  </div>
</div>

<!-- ══ 弹层 ══ -->
<div id="弹层遮罩" class="隐藏" onclick="if(event.target===this)关闭弹层()">
  <div class="弹层内容" id="弹层内容"></div>
</div>

<!-- ══ 主应用 ══ -->
<div id="主应用" class="隐藏">
  <div class="顶栏">
    <div class="顶栏左">
      <div class="顶栏标题行">
        <button class="btn 返回btn" onclick="返回首页()">← 返回</button>
        <span class="应用标题" id="应用标题">电表计算器</span>
      </div>
      <div class="状态行">
        <span class="码标记">共享码：<strong id="顶栏码">——</strong></span>
        <span class="同步徽章 徽章离线" id="同步徽章">离线</span>
      </div>
    </div>
    <button class="btn 编辑按钮" id="编辑btn" onclick="切换编辑()">编辑</button>
  </div>
  <div class="内容区" id="内容区"></div>
</div>

<!-- ══ 设置面板 ══ -->
<div id="设置面板" class="隐藏" onclick="if(event.target===this)关闭设置()">
  <div class="设置内容">
    <div class="设置标题">配置云同步</div>
    <div class="设置说明">设置后，同一分组的公式可在多台手机间自动同步。</div>
    <label class="设置标签">jsonbin.io 密钥（X-Master-Key）</label>
    <input class="设置输入" id="密钥输入" type="text" placeholder="$2a$ 或 $2b$ 开头…" autocomplete="off">
    <div class="步骤块">
      <div class="步骤标题">如何获取密钥</div>
      <div class="步骤内容">访问 <a href="https://jsonbin.io" target="_blank">jsonbin.io</a> 注册免费账号 → 登录后点头像 → API Keys → 复制 X-Master-Key</div>
    </div>
    <div class="步骤块">
      <div class="步骤标题">不设置也没关系</div>
      <div class="步骤内容">公式存在本机，离线照常使用，但不同手机间不会自动同步。</div>
    </div>
    <button class="btn 设置保存btn" onclick="保存设置()">保存</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.1/math.min.js"></script>
<script>
// ══ 存储键 ══
const GROUPS_KEY = 'meter_groups';
const API_KEY_KEY = 'meter_api_key';
const DATA_KEY = c => 'meter_data_' + c;
const BIN_KEY  = c => 'meter_bin_' + c;

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ══ 分组持久化 ══
function 读分组列表() { try{return JSON.parse(localStorage.getItem(GROUPS_KEY)||'[]');}catch(e){return[];} }
function 存分组列表(l) { localStorage.setItem(GROUPS_KEY,JSON.stringify(l)); }
function 添加或更新分组(码,名称) {
  const l=读分组列表().filter(g=>g.码!==码);
  l.unshift({码,名称,时间:Date.now()});
  存分组列表(l);
}
function 删除分组记录(码) { 存分组列表(读分组列表().filter(g=>g.码!==码)); }
function 格式化时间(ts) {
  if(!ts)return'';
  const d=Date.now()-ts;
  if(d<60000)return'刚刚';
  if(d<3600000)return Math.floor(d/60000)+'分钟前';
  if(d<86400000)return Math.floor(d/3600000)+'小时前';
  return Math.floor(d/86400000)+'天前';
}

// ══ 渲染首页 ══
function 渲染首页() {
  const l=读分组列表();
  const 容器=document.getElementById('分组列表区');
  if(!l.length){
    容器.innerHTML=`<div class="空状态"><div class="空状态图标">📋</div><div class="空状态文字">还没有加入任何分组<br>点下方按钮新建或加入</div></div>`;
    return;
  }
  容器.innerHTML=`<div class="分组列表">${l.map(g=>`
    <div class="分组卡片" onclick="进入分组('${g.码}','${esc(g.名称)}')">
      <div class="分组图标">⚡</div>
      <div class="分组信息">
        <div class="分组名称">${g.名称}</div>
        <div class="分组码行"><span class="码显示">${g.码}</span><span class="最后使用">${格式化时间(g.时间)}</span></div>
      </div>
      <div class="卡片右侧">
        <span class="进入箭头">›</span>
        <button class="btn 删除分组btn" onclick="event.stopPropagation();删除分组('${g.码}','${esc(g.名称)}')">删除</button>
      </div>
    </div>`).join('')}</div>`;
}
function 删除分组(码,名称) {
  if(confirm(`删除分组「${名称}」？\n仅删除本机记录，不影响他人。`)){
    删除分组记录(码); 渲染首页();
  }
}

// ══ 弹层 ══
function 打开加入弹层() {
  document.getElementById('弹层内容').innerHTML=`
    <div class="弹层标题">加入分组</div>
    <div class="弹层说明">输入同事给你的 6 位共享码</div>
    <label class="输入标签">共享码</label>
    <input class="码输入框" id="码框" type="text" maxlength="6" inputmode="numeric" placeholder="- - - - - -"
      oninput="this.value=this.value.replace(/\\D/g,'')" onkeydown="if(event.key==='Enter')点加入()">
    <div class="码提示">向同事索取 6 位数字</div>
    <button class="btn 弹层主btn" id="加入btn" onclick="点加入()">加入</button>
    <button class="btn 弹层次btn" onclick="关闭弹层()">取消</button>`;
  document.getElementById('弹层遮罩').classList.remove('隐藏');
  setTimeout(()=>document.getElementById('码框')?.focus(),100);
}
function 关闭弹层() { document.getElementById('弹层遮罩').classList.add('隐藏'); }

async function 点加入() {
  const 码=document.getElementById('码框')?.value.trim();
  if(!码||码.length!==6||!/^\d{6}$/.test(码)){提示('请输入 6 位数字','错误');return;}
  const btn=document.getElementById('加入btn');
  if(btn){btn.disabled=true;btn.textContent='连接中…';}
  关闭弹层();
  await 进入应用(码,false,'分组 '+码);
}

async function 点新建() {
  const 码=String(Math.floor(100000+Math.random()*900000));
  await 进入应用(码,true,'我的分组');
  // 新建后展示码
  document.getElementById('弹层内容').innerHTML=`
    <div class="弹层标题">新建成功！</div>
    <div class="弹层说明">把共享码发给同事，对方输入后即可同步公式</div>
    <div class="新码展示">
      <div class="新码标签">你的共享码</div>
      <div class="新码数字">${码}</div>
      <div class="新码说明">长按数字可以复制</div>
    </div>
    <button class="btn 弹层主btn" onclick="关闭弹层()">知道了，开始使用</button>`;
  document.getElementById('弹层遮罩').classList.remove('隐藏');
}

// ══ 应用状态 ══
let 当前码='', 编辑中=false, 数据=[], 编号计数=1, 同步定时器=null;

const 默认数据=()=>[
  {id:1,名称:'本月用电量',公式:'本期示数 - 上期示数',变量:[{名:'本期示数（度）',符:'本期示数',值:''},{名:'上期示数（度）',符:'上期示数',值:''}],单位:'度'},
  {id:2,名称:'本月电费',公式:'用电量 * 电价',变量:[{名:'用电量（度）',符:'用电量',值:''},{名:'电价（元/度）',符:'电价',值:'0.6'}],单位:'元'},
  {id:3,名称:'多户分摊',公式:'总电费 / 户数',变量:[{名:'总电费（元）',符:'总电费',值:''},{名:'户数',符:'户数',值:''}],单位:'元/户'},
  {id:4,名称:'峰谷合计',公式:'峰段用电 + 谷段用电',变量:[{名:'峰段用电（度）',符:'峰段用电',值:''},{名:'谷段用电（度）',符:'谷段用电',值:''}],单位:'度'},
];

async function 进入分组(码, 名称) {
  添加或更新分组(码, 名称);
  渲染首页();
  await 进入应用(码, false, 名称);
}

async function 进入应用(码, 是新建, 名称) {
  当前码=码; 编辑中=false;
  document.getElementById('顶栏码').textContent=码;
  document.getElementById('应用标题').textContent=名称||'电表计算器';
  document.getElementById('首页').classList.add('隐藏');
  document.getElementById('主应用').classList.remove('隐藏');

  // 立即从本地加载，不等网络
  const 本地=读本地(码);
  if(本地){数据=本地.列表;编号计数=本地.编号计数||数据.length+1;}
  else{数据=默认数据();编号计数=数据.length+1;}
  渲染计算页();

  // 记住分组
  添加或更新分组(码, 名称);

  // 后台同步
  设徽章('同步中');
  const ok=await 首次同步(码,是新建);
  设徽章(ok?'已同步':'离线');
  if(!ok&&!本地&&!是新建)提示('离线模式，使用默认公式','普通');
  开始定时同步();

  if(!读密钥()&&!localStorage.getItem('meter_skip_setup')){
    setTimeout(()=>{
      if(confirm('设置云同步后，可与同事共享公式。\n现在去设置？'))打开设置();
      else localStorage.setItem('meter_skip_setup','1');
    },600);
  }
}

function 返回首页() {
  if(同步定时器){clearInterval(同步定时器);同步定时器=null;}
  document.getElementById('主应用').classList.add('隐藏');
  document.getElementById('首页').classList.remove('隐藏');
  渲染首页();
}

// ══ 本地存储 ══
function 读本地(码){try{const s=localStorage.getItem(DATA_KEY(码));return s?JSON.parse(s):null;}catch(e){return null;}}
function 存本地(码,p){try{localStorage.setItem(DATA_KEY(码),JSON.stringify(p));}catch(e){}}
function 读密钥(){return localStorage.getItem(API_KEY_KEY)||'';}
function 存密钥(k){localStorage.setItem(API_KEY_KEY,k);}
function 读BinId(码){return localStorage.getItem(BIN_KEY(码))||null;}
function 存BinId(码,id){localStorage.setItem(BIN_KEY(码),id);}

// ══ 云同步 ══
async function 创建云端(码,p){
  const k=读密钥();if(!k)return null;
  try{const r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':k,'X-Bin-Name':'meter_'+码,'X-Bin-Private':'false'},body:JSON.stringify(p)});if(!r.ok)return null;const d=await r.json();return d.metadata?.id||null;}catch(e){return null;}
}
async function 读取云端(id){
  const k=读密钥();if(!k||!id)return null;
  try{const r=await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`,{headers:{'X-Master-Key':k}});if(!r.ok)return null;const d=await r.json();return d.record||null;}catch(e){return null;}
}
async function 更新云端(id,p){
  const k=读密钥();if(!k||!id)return false;
  try{const r=await fetch(`https://api.jsonbin.io/v3/b/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':k},body:JSON.stringify(p)});return r.ok;}catch(e){return false;}
}
async function 首次同步(码,是新建){
  const k=读密钥();if(!k)return false;
  let id=读BinId(码);
  if(!id){try{const r=await fetch('https://api.jsonbin.io/v3/b?q=meter_'+码,{headers:{'X-Master-Key':k}});if(r.ok){const l=await r.json();if(l.length>0)id=l[0]._id;}}catch(e){}}
  if(id){
    存BinId(码,id);
    if(!是新建){const 云=await 读取云端(id);if(云&&云.时间戳>(读本地(码)?.时间戳||0)){数据=云.列表;编号计数=云.编号计数||数据.length+1;存本地(码,{列表:数据,编号计数,时间戳:云.时间戳});渲染计算页();}}
    else await 推送云端();
    return true;
  }else if(是新建){const p={列表:数据,编号计数,时间戳:Date.now()};const nid=await 创建云端(码,p);if(nid){存BinId(码,nid);存本地(码,p);return true;}}
  return false;
}
function 开始定时同步(){
  if(同步定时器)clearInterval(同步定时器);
  同步定时器=setInterval(async()=>{
    const id=读BinId(当前码);if(!id){设徽章('离线');return;}
    const 云=await 读取云端(id);if(!云){设徽章('离线');return;}
    const 本地=读本地(当前码);
    if(云.时间戳>(本地?.时间戳||0)){数据=云.列表;编号计数=云.编号计数||数据.length+1;存本地(当前码,{列表:数据,编号计数,时间戳:云.时间戳});渲染计算页();}
    设徽章('已同步');
  },20000);
}
async function 推送云端(){
  const id=读BinId(当前码);const ts=Date.now();const p={列表:数据,编号计数,时间戳:ts};
  存本地(当前码,p);if(!id)return;设徽章('同步中');
  const ok=await 更新云端(id,p);设徽章(ok?'已同步':'离线');
}

// ══ 计算 ══
function 计算(公式,变量列表){
  try{let s={},空=false;变量列表.forEach(v=>{if(v.值==='')空=true;s[v.符]=parseFloat(v.值)||0;});if(空)return{ok:false,empty:true};const r=math.evaluate(公式,s);if(typeof r==='number'&&isFinite(r))return{ok:true,值:Math.round(r*10000)/10000};return{ok:false};}catch(e){return{ok:false};}
}

// ══ 渲染计算页 ══
function 渲染计算页(){
  const 容器=document.getElementById('内容区');容器.innerHTML='';
  数据.forEach(w=>{
    const res=计算(w.公式,w.变量);const el=document.createElement('div');
    el.className='卡片'+(编辑中?' 编辑态':'');
    const 头=编辑中?`<input class="卡片标题输入" value="${esc(w.名称)}" onchange="改名(${w.id},this.value)"><button class="btn 删除卡片btn" onclick="删卡片(${w.id})">删除</button>`:`<span class="卡片标题">${w.名称}</span>`;
    const 公式区=编辑中?`<div style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #EAEAE6"><div class="公式行" style="margin:0;padding:0;border:0"><span class="小标签">公式</span><input class="公式输入" value="${esc(w.公式)}" oninput="改公式(${w.id},this.value)"></div><div class="公式提示">变量名须与下方一致，支持 + − * /</div></div>`:`<div class="公式行"><span class="小标签">公式</span><span class="公式展示">${w.公式}</span></div>`;
    const 变量们=w.变量.map((v,i)=>编辑中?`<div class="变量行"><input class="变量名输入" value="${esc(v.名)}" onchange="改变量名(${w.id},${i},this.value)"><input class="数值输入" type="number" inputmode="decimal" value="${v.值}" placeholder="——" oninput="改数值(${w.id},${i},this.value)">${w.变量.length>1?`<button class="btn 删除变量btn" onclick="删变量(${w.id},${i})">删除</button>`:''}</div>`:`<div class="变量行"><span class="变量名称">${v.名}</span><input class="数值输入" type="number" inputmode="decimal" value="${v.值}" placeholder="请输入" oninput="改数值(${w.id},${i},this.value)"></div>`).join('');
    const 单位=编辑中?`<input class="结果单位输入" value="${esc(w.单位)}" placeholder="单位" onchange="改单位(${w.id},this.value)">`:`<span class="结果单位">${w.单位}</span>`;
    let 结果HTML;
    if(res.ok)结果HTML=`<div class="结果区"><span class="结果标签">结果</span><span class="结果数值">${res.值}</span>${单位}</div>`;
    else if(res.empty)结果HTML=`<div class="结果区"><span class="结果标签">结果</span><span class="结果空">——</span>${单位}</div>`;
    else 结果HTML=`<div class="错误区">公式有误，请在编辑模式下检查</div>`;
    el.innerHTML=`<div class="卡片头">${头}</div><div class="卡片体">${公式区}<div class="变量列表">${变量们}</div>${编辑中?`<button class="btn 新增变量btn" onclick="加变量(${w.id})">＋ 新增一行变量</button>`:''} ${结果HTML}</div>`;
    容器.appendChild(el);
  });
  if(编辑中){const b=document.createElement('button');b.className='btn 新增项目btn';b.textContent='＋ 新增计算项目';b.onclick=加卡片;容器.appendChild(b);}
  const eb=document.getElementById('编辑btn');eb.textContent=编辑中?'完成':'编辑';eb.className='btn 编辑按钮'+(编辑中?' 激活':'');
}
function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// ══ 编辑操作 ══
function 切换编辑(){编辑中=!编辑中;if(!编辑中)推送云端();渲染计算页();}
function 改名(id,v){
  const w=数据.find(w=>w.id===id);w.名称=v;
  // 同步更新首页分组名
  const l=读分组列表();const g=l.find(g=>g.码===当前码);
  if(g){g.名称=v;存分组列表(l);}
  document.getElementById('应用标题').textContent=v;
}
function 改公式(id,v){数据.find(w=>w.id===id).公式=v;渲染计算页();}
function 改数值(id,i,v){数据.find(w=>w.id===id).变量[i].值=v;渲染计算页();}
function 改变量名(id,i,v){const w=数据.find(w=>w.id===id);const 旧=w.变量[i].符;const 新=v.replace(/[（）()\s]/g,'').substring(0,8)||('变量'+(i+1));w.公式=w.公式.split(旧).join(新);w.变量[i].名=v;w.变量[i].符=新;渲染计算页();}
function 改单位(id,v){数据.find(w=>w.id===id).单位=v;}
function 加变量(id){const w=数据.find(w=>w.id===id);const n='变量'+(w.变量.length+1);w.变量.push({名:n,符:n,值:''});渲染计算页();}
function 删变量(id,i){数据.find(w=>w.id===id).变量.splice(i,1);渲染计算页();}
function 删卡片(id){if(数据.length<=1){提示('至少保留一个计算项目','错误');return;}if(!confirm('确认删除此项目？'))return;数据=数据.filter(w=>w.id!==id);渲染计算页();}
function 加卡片(){数据.push({id:编号计数++,名称:'新计算项目',公式:'变量1 + 变量2',变量:[{名:'变量1',符:'变量1',值:''},{名:'变量2',符:'变量2',值:''}],单位:''});渲染计算页();}

// ══ 设置 ══
function 打开设置(){document.getElementById('密钥输入').value=读密钥();document.getElementById('设置面板').classList.remove('隐藏');}
function 关闭设置(){document.getElementById('设置面板').classList.add('隐藏');}
function 保存设置(){const k=document.getElementById('密钥输入').value.trim();存密钥(k);关闭设置();if(k){提示('密钥已保存，正在同步…','普通');首次同步(当前码,false);}else提示('已保存（离线模式）','普通');}

// ══ 工具 ══
function 设徽章(s){const el=document.getElementById('同步徽章');el.className='同步徽章';if(s==='同步中'){el.classList.add('徽章同步中');el.textContent='同步中…';}else if(s==='已同步'){el.classList.add('徽章已同步');el.textContent='已同步';}else{el.classList.add('徽章离线');el.textContent='离线';}}
let 提示t=null;
function 提示(文字,类型='普通'){const el=document.getElementById('提示条');el.textContent=文字;el.className='提示条 显示 '+(类型==='成功'?'提示成功':类型==='错误'?'提示错误':'提示普通');if(提示t)clearTimeout(提示t);提示t=setTimeout(()=>el.classList.remove('显示'),2800);}

// ══ 启动 ══
渲染首页();
</script>
</body>
