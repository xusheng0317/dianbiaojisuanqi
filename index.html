<script>
// ══ 存储键 ══
const GROUPS_KEY   = 'meter_groups_v3';
const RUNTIME_KEY  = 'meter_runtime_key';   // 运行时密钥（引导页或跳过后存储）
const DATA_KEY     = c => 'meter_data_' + c;
const BIN_KEY      = c => 'meter_bin_' + c;

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ══ 获取实际使用的 API 密钥 ══
// 优先级：代码里的 SHARED_KEY > 运行时手动输入的密钥
function 获取密钥() {
  if (typeof SHARED_KEY !== 'undefined' && SHARED_KEY && SHARED_KEY.length > 10) return SHARED_KEY;
  return localStorage.getItem(RUNTIME_KEY) || '';
}
function 有密钥() { return !!获取密钥(); }

// ══ 启动逻辑 ══
function 启动() {
  if (有密钥()) {
    // 密钥已就绪（代码里写好了 或 之前已设置）
    显示首页();
  } else {
    // 没有密钥，引导设置
    document.getElementById('设置引导页').classList.remove('隐藏');
  }
}

function 保存引导密钥() {
  const k = document.getElementById('引导密钥框').value.trim();
  if (!k || (!k.startsWith('$2a$') && !k.startsWith('$2b$'))) {
    提示('请填入正确的密钥（$2a$ 或 $2b$ 开头）', '错误'); return;
  }
  localStorage.setItem(RUNTIME_KEY, k);
  document.getElementById('设置引导页').classList.add('隐藏');
  显示首页();
  提示('设置成功！', '成功');
}

function 跳过设置() {
  localStorage.setItem(RUNTIME_KEY, '__offline__');
  document.getElementById('设置引导页').classList.add('隐藏');
  显示首页();
  提示('已进入本机模式，公式不会同步到他人', '普通');
}

function 显示首页() {
  document.getElementById('首页').classList.remove('隐藏');
  渲染首页();
}

// ══ 分组持久化 ══
function 读分组列表() { try{return JSON.parse(localStorage.getItem(GROUPS_KEY)||'[]');}catch(e){return[];} }
function 存分组列表(l) { localStorage.setItem(GROUPS_KEY, JSON.stringify(l)); }
function 添加或更新分组(码, 名称) {
  const l = 读分组列表().filter(g => g.码 !== 码);
  l.unshift({码, 名称, 时间: Date.now()});
  存分组列表(l);
}
function 删除分组记录(码) { 存分组列表(读分组列表().filter(g => g.码 !== 码)); }
function 格式化时间(ts) {
  if (!ts) return '';
  const d = Date.now() - ts;
  if (d < 60000) return '刚刚';
  if (d < 3600000) return Math.floor(d/60000) + '分钟前';
  if (d < 86400000) return Math.floor(d/3600000) + '小时前';
  return Math.floor(d/86400000) + '天前';
}

// ══ 渲染首页 ══
function 渲染首页() {
  const l = 读分组列表();
  const 容器 = document.getElementById('分组列表区');
  if (!l.length) {
    容器.innerHTML = `<div class="空状态"><div class="空状态图标">📋</div><div class="空状态文字">还没有加入任何分组<br>点下方按钮新建或加入</div></div>`;
    return;
  }
  容器.innerHTML = `<div class="分组列表">${l.map(g => `
    <div class="分组卡片" onclick="进入分组('${g.码}','${esc(g.名称)}')">
      <div class="分组图标">⚡</div>
      <div class="分组信息">
        <div class="分组名称">${g.名称}</div>
        <div class="分组码行">
          <span class="码显示">${g.码}</span>
          <span class="最后使用">${格式化时间(g.时间)}</span>
        </div>
      </div>
      <div class="卡片右侧">
        <span class="进入箭头">›</span>
        <button class="btn 删除分组btn" onclick="event.stopPropagation();确认删除('${g.码}','${esc(g.名称)}')">删除</button>
      </div>
    </div>`).join('')}</div>`;
}

function 确认删除(码, 名称) {
  if (confirm(`删除分组「${名称}」？\n仅删除本机记录，不影响他人。`)) {
    删除分组记录(码); 渲染首页();
  }
}

// ══ 弹层 ══
function 关闭弹层() { document.getElementById('弹层遮罩').classList.add('隐藏'); }
function 显示弹层(html) {
  document.getElementById('弹层内容').innerHTML = html;
  document.getElementById('弹层遮罩').classList.remove('隐藏');
}

// —— 加入弹层 ——
function 打开加入弹层() {
  显示弹层(`
    <div class="弹层标题">加入分组</div>
    <div class="弹层说明">输入同事给你的 6 位共享码</div>
    <input class="码输入框" id="码框" type="text" maxlength="6" inputmode="numeric"
      placeholder="— — — — — —"
      oninput="this.value=this.value.replace(/\\D/g,'')"
      onkeydown="if(event.key==='Enter')点加入()">
    <div class="码提示">向同事索取 6 位数字</div>
    <button class="btn 弹层主btn" id="加入btn" onclick="点加入()">加入</button>
    <button class="btn 弹层次btn" onclick="关闭弹层()">取消</button>`);
  setTimeout(() => document.getElementById('码框')?.focus(), 100);
}

async function 点加入() {
  const 码 = document.getElementById('码框')?.value.trim();
  if (!码 || 码.length !== 6 || !/^\d{6}$/.test(码)) { 提示('请输入 6 位数字', '错误'); return; }
  const btn = document.getElementById('加入btn');
  if (btn) { btn.disabled = true; btn.textContent = '连接中…'; }
  关闭弹层();
  await 进入应用(码, false, '分组 ' + 码);
}

// —— 新建 ——
async function 点新建() {
  const 码 = String(Math.floor(100000 + Math.random() * 900000));
  await 进入应用(码, true, '我的分组');
  // 展示共享码
  显示弹层(`
    <div class="弹层标题">新建成功！</div>
    <div class="弹层说明">把共享码发给同事，对方输入后公式自动同步</div>
    <div class="新建码展示">
      <div class="新建码标签">共享码</div>
      <div class="新建码数字">${码}</div>
      <div class="新建码说明">把这 6 位数字告诉同事即可</div>
    </div>
    <button class="btn 弹层主btn" onclick="关闭弹层()">知道了，开始使用</button>`);
}

// ══ 应用状态 ══
let 当前码 = '', 编辑中 = false, 数据 = [], 编号计数 = 1, 同步定时器 = null;

const 默认数据 = () => [
  {id:1,名称:'本月用电量',公式:'本期示数 - 上期示数',变量:[{名:'本期示数（度）',符:'本期示数',值:''},{名:'上期示数（度）',符:'上期示数',值:''}],单位:'度'},
  {id:2,名称:'本月电费',公式:'用电量 * 电价',变量:[{名:'用电量（度）',符:'用电量',值:''},{名:'电价（元/度）',符:'电价',值:'0.6'}],单位:'元'},
  {id:3,名称:'多户分摊',公式:'总电费 / 户数',变量:[{名:'总电费（元）',符:'总电费',值:''},{名:'户数',符:'户数',值:''}],单位:'元/户'},
  {id:4,名称:'峰谷合计',公式:'峰段用电 + 谷段用电',变量:[{名:'峰段用电（度）',符:'峰段用电',值:''},{名:'谷段用电（度）',符:'谷段用电',值:''}],单位:'度'},
];

async function 进入分组(码, 名称) {
  添加或更新分组(码, 名称);
  渲染首页();
  await 进入应用(码, false, 名称);
}

async function 进入应用(码, 是新建, 名称) {
  当前码 = 码; 编辑中 = false;
  document.getElementById('顶栏码').textContent = 码;
  document.getElementById('应用标题').textContent = 名称 || '电表计算器';
  document.getElementById('首页').classList.add('隐藏');
  document.getElementById('主应用').classList.remove('隐藏');

  const 本地 = 读本地(码);
  if (本地) { 数据 = 本地.列表; 编号计数 = 本地.编号计数 || 数据.length + 1; }
  else { 数据 = 默认数据(); 编号计数 = 数据.length + 1; }
  渲染计算页();
  添加或更新分组(码, 名称);

  设徽章('同步中');
  const ok = await 首次同步(码, 是新建);
  设徽章(ok ? '已同步' : '离线');
  if (!ok && !本地 && !是新建) 提示('未能连接云端，使用默认公式', '普通');
  开始定时同步();
}

function 返回首页() {
  if (同步定时器) { clearInterval(同步定时器); 同步定时器 = null; }
  document.getElementById('主应用').classList.add('隐藏');
  document.getElementById('首页').classList.remove('隐藏');
  渲染首页();
}

// ══ 本地存储 ══
function 读本地(码) { try{const s=localStorage.getItem(DATA_KEY(码));return s?JSON.parse(s):null;}catch(e){return null;} }
function 存本地(码,p) { try{localStorage.setItem(DATA_KEY(码),JSON.stringify(p));}catch(e){} }
function 读BinId(码) { return localStorage.getItem(BIN_KEY(码))||null; }
function 存BinId(码,id) { localStorage.setItem(BIN_KEY(码),id); }

// ══ 云同步（所有人同一密钥） ══
async function 创建云端(码, p) {
  const k = 获取密钥(); if (!k || k==='__offline__') return null;
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b', {method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':k,'X-Bin-Name':'meter_'+码,'X-Bin-Private':'false'},body:JSON.stringify(p)});
    if (!r.ok) return null;
    const d = await r.json(); return d.metadata?.id || null;
  } catch(e) { return null; }
}
async function 读取云端(id) {
  const k = 获取密钥(); if (!k || k==='__offline__' || !id) return null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {headers:{'X-Master-Key':k}});
    if (!r.ok) return null;
    const d = await r.json(); return d.record || null;
  } catch(e) { return null; }
}
async function 更新云端(id, p) {
  const k = 获取密钥(); if (!k || k==='__offline__' || !id) return false;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${id}`, {method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':k},body:JSON.stringify(p)});
    return r.ok;
  } catch(e) { return false; }
}

async function 搜索云端bin(码) {
  const k = 获取密钥(); if (!k || k==='__offline__') return null;
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b?q=meter_'+码, {headers:{'X-Master-Key':k}});
    if (!r.ok) return null;
    const l = await r.json();
    return (l.length > 0) ? (l[0]._id || null) : null;
  } catch(e) { return null; }
}

async function 首次同步(码, 是新建) {
  if (!有密钥() || 获取密钥()==='__offline__') return false;
  let id = 读BinId(码);
  if (!id) id = await 搜索云端bin(码);
  if (id) {
    存BinId(码, id);
    if (!是新建) {
      const 云 = await 读取云端(id);
      if (云 && 云.时间戳 > (读本地(码)?.时间戳||0)) {
        数据 = 云.列表; 编号计数 = 云.编号计数 || 数据.length + 1;
        存本地(码, {列表:数据, 编号计数, 时间戳:云.时间戳});
        渲染计算页();
      }
    } else {
      await 推送云端();
    }
    return true;
  } else if (是新建) {
    const p = {列表:数据, 编号计数, 时间戳:Date.now()};
    const nid = await 创建云端(码, p);
    if (nid) { 存BinId(码, nid); 存本地(码, p); return true; }
  }
  return false;
}

function 开始定时同步() {
  if (同步定时器) clearInterval(同步定时器);
  同步定时器 = setInterval(async () => {
    const id = 读BinId(当前码); if (!id) { 设徽章('离线'); return; }
    const 云 = await 读取云端(id); if (!云) { 设徽章('离线'); return; }
    const 本地 = 读本地(当前码);
    if (云.时间戳 > (本地?.时间戳||0)) {
      数据 = 云.列表; 编号计数 = 云.编号计数 || 数据.length + 1;
      存本地(当前码, {列表:数据, 编号计数, 时间戳:云.时间戳});
      渲染计算页();
      提示('公式已更新', '成功');
    }
    设徽章('已同步');
  }, 15000);
}

async function 推送云端() {
  const id = 读BinId(当前码); const ts = Date.now();
  const p = {列表:数据, 编号计数, 时间戳:ts};
  存本地(当前码, p); if (!id) return;
  设徽章('同步中');
  const ok = await 更新云端(id, p);
  设徽章(ok ? '已同步' : '离线');
}

// ══ 计算 ══
function 计算(公式, 变量列表) {
  try {
    let s={}, 空=false;
    变量列表.forEach(v => { if(v.值==='') 空=true; s[v.符]=parseFloat(v.值)||0; });
    if(空) return {ok:false,empty:true};
    const r = math.evaluate(公式, s);
    if(typeof r==='number'&&isFinite(r)) return {ok:true,值:Math.round(r*10000)/10000};
    return {ok:false};
  } catch(e) { return {ok:false}; }
}

// ══ 渲染计算页 ══
function 渲染计算页() {
  const 容器 = document.getElementById('内容区'); 容器.innerHTML = '';
  数据.forEach(w => {
    const res = 计算(w.公式, w.变量); const el = document.createElement('div');
    el.className = '卡片' + (编辑中 ? ' 编辑态' : '');
    const 头 = 编辑中
      ? `<input class="卡片标题输入" value="${esc(w.名称)}" onchange="改名(${w.id},this.value)"><button class="btn 删除卡片btn" onclick="删卡片(${w.id})">删除</button>`
      : `<span class="卡片标题">${w.名称}</span>`;
    const 公式区 = 编辑中
      ? `<div style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #EAEAE6"><div class="公式行" style="margin:0;padding:0;border:0"><span class="小标签">公式</span><input class="公式输入" value="${esc(w.公式)}" oninput="改公式(${w.id},this.value)"></div><div class="公式提示">变量名须与下方一致，支持 + − * /</div></div>`
      : `<div class="公式行"><span class="小标签">公式</span><span class="公式展示">${w.公式}</span></div>`;
    const 变量们 = w.变量.map((v,i) => 编辑中
      ? `<div class="变量行"><input class="变量名输入" value="${esc(v.名)}" onchange="改变量名(${w.id},${i},this.value)"><input class="数值输入" type="number" inputmode="decimal" value="${v.值}" placeholder="——" oninput="改数值(${w.id},${i},this.value)">${w.变量.length>1?`<button class="btn 删除变量btn" onclick="删变量(${w.id},${i})">删除</button>`:''}</div>`
      : `<div class="变量行"><span class="变量名称">${v.名}</span><input class="数值输入" type="number" inputmode="decimal" value="${v.值}" placeholder="请输入" oninput="改数值(${w.id},${i},this.value)"></div>`
    ).join('');
    const 单位 = 编辑中
      ? `<input class="结果单位输入" value="${esc(w.单位)}" placeholder="单位" onchange="改单位(${w.id},this.value)">`
      : `<span class="结果单位">${w.单位}</span>`;
    let 结果HTML;
    if(res.ok)          结果HTML=`<div class="结果区"><span class="结果标签">结果</span><span class="结果数值">${res.值}</span>${单位}</div>`;
    else if(res.empty)  结果HTML=`<div class="结果区"><span class="结果标签">结果</span><span class="结果空">——</span>${单位}</div>`;
    else                结果HTML=`<div class="错误区">公式有误，请在编辑模式下检查</div>`;
    el.innerHTML = `<div class="卡片头">${头}</div><div class="卡片体">${公式区}<div class="变量列表">${变量们}</div>${编辑中?`<button class="btn 新增变量btn" onclick="加变量(${w.id})">＋ 新增一行变量</button>`:''} ${结果HTML}</div>`;
    容器.appendChild(el);
  });
  if (编辑中) {
    const b = document.createElement('button'); b.className='btn 新增项目btn'; b.textContent='＋ 新增计算项目'; b.onclick=加卡片;
    容器.appendChild(b);
  }
  const eb = document.getElementById('编辑btn');
  eb.textContent = 编辑中 ? '完成' : '编辑';
  eb.className = 'btn 编辑按钮' + (编辑中 ? ' 激活' : '');
}
function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ══ 编辑操作 ══
function 切换编辑() { 编辑中=!编辑中; if(!编辑中) 推送云端(); 渲染计算页(); }
function 改名(id,v) {
  数据.find(w=>w.id===id).名称=v;
  const l=读分组列表(); const g=l.find(g=>g.码===当前码);
  if(g){g.名称=v;存分组列表(l);}
  document.getElementById('应用标题').textContent=v;
}
function 改公式(id,v) { 数据.find(w=>w.id===id).公式=v; 渲染计算页(); }
function 改数值(id,i,v) { 数据.find(w=>w.id===id).变量[i].值=v; 渲染计算页(); }
function 改变量名(id,i,v) {
  const w=数据.find(w=>w.id===id); const 旧=w.变量[i].符;
  const 新=v.replace(/[（）()\s]/g,'').substring(0,8)||('变量'+(i+1));
  w.公式=w.公式.split(旧).join(新); w.变量[i].名=v; w.变量[i].符=新; 渲染计算页();
}
function 改单位(id,v) { 数据.find(w=>w.id===id).单位=v; }
function 加变量(id) { const w=数据.find(w=>w.id===id); const n='变量'+(w.变量.length+1); w.变量.push({名:n,符:n,值:''}); 渲染计算页(); }
function 删变量(id,i) { 数据.find(w=>w.id===id).变量.splice(i,1); 渲染计算页(); }
function 删卡片(id) { if(数据.length<=1){提示('至少保留一个计算项目','错误');return;} if(!confirm('确认删除？'))return; 数据=数据.filter(w=>w.id!==id); 渲染计算页(); }
function 加卡片() { 数据.push({id:编号计数++,名称:'新计算项目',公式:'变量1 + 变量2',变量:[{名:'变量1',符:'变量1',值:''},{名:'变量2',符:'变量2',值:''}],单位:''}); 渲染计算页(); }

// ══ 工具 ══
function 设徽章(s) {
  const el=document.getElementById('同步徽章'); el.className='同步徽章';
  if(s==='同步中'){el.classList.add('徽章同步中');el.textContent='同步中…';}
  else if(s==='已同步'){el.classList.add('徽章已同步');el.textContent='已同步';}
  else{el.classList.add('徽章离线');el.textContent='离线';}
}
let 提示t=null;
function 提示(文字,类型='普通') {
  const el=document.getElementById('提示条'); el.textContent=文字;
  el.className='提示条 显示 '+(类型==='成功'?'提示成功':类型==='错误'?'提示错误':'提示普通');
  if(提示t)clearTimeout(提示t); 提示t=setTimeout(()=>el.classList.remove('显示'),2800);
}

// ══ 启动 ══
启动();
</script>
